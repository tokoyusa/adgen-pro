<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Adgen Pro</title>

  <meta name="description" content="Selamat Datang di Aplikasi Adgen Pro" />
  <meta name="theme-color" content="#0f172a" />

  <link rel="manifest" href="manifest.json" />
  <link
    rel="apple-touch-icon"
    href="https://ptzueextdvcahhzwetyg.supabase.co/storage/v1/object/public/images/logo%20(1).png"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 40px 30px;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .logo {
      width: 150px;
      max-width: 100%;
      margin-bottom: 25px;
      border-radius: 24px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    h2 {
      font-size: 34px;
      color: #38bdf8;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 38px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      border-radius: 12px;
      transition: 0.3s ease;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    #installBtn {
      display: none;
      margin-top: 18px;
      background: #22c55e;
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <main class="container">
    <img
      src="https://ptzueextdvcahhzwetyg.supabase.co/storage/v1/object/public/images/logo%20(1).png"
      alt="Logo Adgen Pro"
      class="logo"
    />

    <h1>Selamat Datang Di Aplikasi</h1>
    <h2>Adgen Pro</h2>

    <a
      href="https://gemini.google.com/share/af1d6b44e78f"
      class="btn"
      target="_blank"
      rel="noopener noreferrer"
    >
      Masuk
    </a>

    <br />

    <button id="installBtn" class="btn">
      Install Aplikasi
    </button>

    <p class="note">
      Jika tombol install belum muncul, buka halaman ini menggunakan Chrome Android.
    </p>
  </main>

  <script>
    let deferredPrompt;
    const installBtn = document.getElementById("installBtn");

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredPrompt = event;
      installBtn.style.display = "inline-block";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredPrompt) return;

      deferredPrompt.prompt();
      await deferredPrompt.userChoice;

      deferredPrompt = null;
      installBtn.style.display = "none";
    });

    window.addEventListener("appinstalled", () => {
      installBtn.style.display = "none";
      deferredPrompt = null;
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }
  </script>

</body>
</html>
