<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selamat Datang - Adgen Pro</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 420px;
      padding: 40px 30px;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .logo {
      width: 150px;
      max-width: 100%;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    h2 {
      font-size: 34px;
      color: #38bdf8;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 38px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      border-radius: 12px;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <main class="container">
    <img
      src="https://ptzueextdvcahhzwetyg.supabase.co/storage/v1/object/public/images/logo%20(1).png"
      alt="Logo Adgen Pro"
      class="logo"
    />

    <h1>Selamat Datang Di Aplikasi</h1>
    <h2>Adgen Pro</h2>

    <a
      href="https://gemini.google.com/share/af1d6b44e78f"
      class="btn"
      target="_blank"
      rel="noopener noreferrer"
    >
      Masuk
    </a>
  </main>

</body>
</html>
